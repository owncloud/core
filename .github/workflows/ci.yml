name: CI

on:
  push:
    branches:
      - master
  pull_request:
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  semantic-git-messages:
    name: Commits
    uses: owncloud/reusable-workflows/.github/workflows/semantic-git-message.yml@main

  php-unit:
    name: PHP Unit
    uses: ./.github/workflows/php-unit.yml
    with:
      php-versions: '["8.3"]'

  acceptance-api:
    name: API Acceptance Tests
    uses: ./.github/workflows/acceptance.yml
    with:
      do-api-tests: true
      server-folder: 'server'
      test-suites: "['apiAuth', 'apiAuthOcs', 'apiAuthWebDav', 'apiCapabilities', 'apiComments', 'apiFavorites', 'apiMain', 'apiProvisioning-v1', 'apiProvisioning-v2', 'apiProvisioningGroups-v1', 'apiProvisioningGroups-v2']"

  acceptance-api-federation:
    name: API Acceptance Tests with Federation
    uses: ./.github/workflows/acceptance.yml
    with:
      do-api-tests: true
      server-folder: 'server'
      federated-folder: 'federated'
      test-suites: "['apiFederationToRoot1', 'apiFederationToRoot2', 'apiFederationToShares1', 'apiFederationToShares2']"

  acceptance-webui:
    name: WebUI Acceptance Tests
    uses: ./.github/workflows/acceptance.yml
    with:
      do-webui-tests: true
      server-folder: 'server'
      test-suites: "['webUIComments']"
